spring:
  application:
    name: blog-backend

  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: Blog@2026
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: YourSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm
  expiration: 86400000 # 24 hours in milliseconds

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  auth:
    public-register-enabled: true
  seed:
    default-admin-enabled: false
  site-config:
    path: ${APP_SITE_CONFIG_PATH:}
    backup-dir: ${APP_SITE_CONFIG_BACKUP_DIR:}
    max-backups: ${APP_SITE_CONFIG_MAX_BACKUPS:20}

notion:
  token: ${NOTION_TOKEN:}
  version: ${NOTION_VERSION:2025-09-03}
  publicImportEnabled: ${NOTION_PUBLIC_IMPORT_ENABLED:false}
  connect-timeout-ms: ${NOTION_CONNECT_TIMEOUT_MS:15000}
  read-timeout-ms: ${NOTION_READ_TIMEOUT_MS:30000}
  max-retries: ${NOTION_MAX_RETRIES:2}
  network-mode: ${NOTION_NETWORK_MODE:DIRECT}
  proxy:
    host: ${NOTION_PROXY_HOST:}
    port: ${NOTION_PROXY_PORT:0}
  oauth:
    client-id: ${NOTION_OAUTH_CLIENT_ID:}
    client-secret: ${NOTION_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${NOTION_OAUTH_REDIRECT_URI:}
    success-redirect: ${NOTION_OAUTH_SUCCESS_REDIRECT:/admin/upload}
